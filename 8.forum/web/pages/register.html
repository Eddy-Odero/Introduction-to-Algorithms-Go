<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — forum_</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand">forum</a>
    <div class="nav-links">
      <a href="/">feed</a>
      <a href="/login">log in</a>
      <a href="/register" class="current">register</a>
    </div>
  </div>
</nav>

<main class="container">
  <form class="form-card">
    <h1>&gt;&gt; register</h1>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <div class="field-error">This email is already registered.</div>
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required>
      <div class="field-error">This username is already taken.</div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <div class="field-error">Password must be at least 8 characters.</div>
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;">Create account</button>

    <p class="form-foot">Already registered? <a href="/login">Log in</a></p>
  </form>
</main>

<footer class="footer">
  <div class="container">forum &middot; Zone01/01Edu project</div>
</footer>

</body>
</html>

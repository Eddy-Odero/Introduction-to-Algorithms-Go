<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New post — forum_</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand">forum</a>
    <div class="nav-links">
      <a href="/">feed</a>
      <a href="/new-post" class="current">new post</a>
      <a href="/profile" class="nav-user">eddy_k</a>
      <a href="/logout">log out</a>
    </div>
  </div>
</nav>

<main class="container">
  <form class="form-card wide">
    <h1>&gt;&gt; new post</h1>

    <div class="field">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="What's this about?" required>
    </div>

    <div class="field">
      <label for="body">Body</label>
      <textarea id="body" name="body" placeholder="Write your post..." required></textarea>
    </div>

    <div class="field">
      <label>Categories</label>
      <div class="tag-row">
        <label class="chip"><input type="checkbox" name="category" value="general" checked> #general</label>
        <label class="chip"><input type="checkbox" name="category" value="technology"> #technology</label>
        <label class="chip"><input type="checkbox" name="category" value="gaming"> #gaming</label>
        <label class="chip"><input type="checkbox" name="category" value="random"> #random</label>
      </div>
      <div class="field-error">Pick at least one category.</div>
    </div>

    <button type="submit" class="btn btn-primary">Publish post</button>
  </form>
</main>

<footer class="footer">
  <div class="container">forum &middot; Zone01/01Edu project</div>
</footer>

</body>
</html>

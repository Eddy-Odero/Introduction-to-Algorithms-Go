<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New post — forum</title>
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/new-post.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand"><span class="brand-mark">f</span>forum</a>
    <div class="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" placeholder="Search posts">
    </div>
    <div class="nav-links">
      <a href="/" class="nav-icon-link" title="Feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/></svg>
      </a>
      <a href="/new-post" class="nav-icon-link current" title="New post">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </a>
      <a href="/profile" class="nav-icon-link" title="Profile">
        <div class="avatar avatar-sm avatar-blue">EK</div>
      </a>
      <a href="/logout" class="nav-link-plain">Log out</a>
      <button class="nav-burger" aria-label="Menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
    </div>
  </div>
  <div class="nav-mobile-panel">
    <a href="/">Feed</a>
    <a href="/category?name=technology">#technology</a>
    <a href="/category?name=general">#general</a>
    <a href="/new-post" class="current">New post</a>
    <a href="/profile">Profile</a>
    <a href="/logout">Log out</a>
  </div>
</nav>

<main class="container">
  <form class="form-card wide card" id="new-post-form" data-validate data-success-message="Post published — this connects to the server in Phase 5.">
    <h1>Create a post</h1>
    <p class="subtitle">Share what you're building, ask for help, or start a discussion.</p>

    <div class="field">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="What's this about?" required>
    </div>

    <div class="field">
      <label for="body">Body</label>
      <textarea id="body" name="body" placeholder="Write your post..." required></textarea>
    </div>

    <div class="field">
      <label for="image-upload">Image <span style="font-weight:400;color:var(--ink-faint);">(optional)</span></label>
      <label class="image-drop" for="image-upload" id="image-drop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <div id="image-drop-label">Click to add an image, or drag one here</div>
        <input type="file" id="image-upload" accept="image/*">
      </label>
    </div>

    <div class="field">
      <label>Categories</label>
      <div class="tag-row" data-require-one>
        <label class="chip"><input type="checkbox" name="category" value="general" checked> #general</label>
        <label class="chip"><input type="checkbox" name="category" value="technology"> #technology</label>
        <label class="chip"><input type="checkbox" name="category" value="gaming"> #gaming</label>
        <label class="chip"><input type="checkbox" name="category" value="random"> #random</label>
      </div>
      <div class="field-error" style="display:none;">Pick at least one category.</div>
    </div>

    <button type="submit" class="btn btn-primary">Publish post</button>
  </form>
</main>

<footer class="footer">forum &middot; Zone01/01Edu project</footer>

<script src="/static/js/nav.js"></script>
<script src="/static/js/forms.js"></script>
<script>
  // Image dropzone preview — local-only, no upload endpoint yet (Phase 5).
  (function () {
    var input = document.getElementById('image-upload');
    var label = document.getElementById('image-drop-label');
    if (!input || !label) return;
    input.addEventListener('change', function () {
      if (input.files && input.files[0]) {
        label.textContent = 'Selected: ' + input.files[0].name;
      } else {
        label.textContent = 'Click to add an image, or drag one here';
      }
    });
  })();
</script>
</body>
</html>

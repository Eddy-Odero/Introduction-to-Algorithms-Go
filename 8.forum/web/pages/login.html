<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — forum_</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand">forum</a>
    <div class="nav-links">
      <a href="/">feed</a>
      <a href="/login" class="current">log in</a>
      <a href="/register">register</a>
    </div>
  </div>
</nav>

<main class="container">
  <form class="form-card">
    <h1>&gt;&gt; log in</h1>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <div class="field-error">No account uses this email.</div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <div class="field-error">Incorrect password.</div>
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;">Log in</button>

    <p class="form-foot">No account yet? <a href="/register">Register</a></p>
  </form>
</main>

<footer class="footer">
  <div class="container">forum &middot; Zone01/01Edu project</div>
</footer>

</body>
</html>

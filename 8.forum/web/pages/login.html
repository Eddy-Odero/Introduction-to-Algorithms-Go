<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — forum</title>
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/login.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="brand"><span class="brand-mark">f</span>forum</a>
    <div class="nav-links">
      <a href="/login" class="nav-link-plain">Log in</a>
      <a href="/register" class="nav-cta">Sign up</a>
    </div>
  </div>
</nav>

<div class="auth-screen">
  <div class="auth-side">
    <div class="brand-mark">f</div>
    <h2>Welcome back</h2>
    <p>Catch up on what the community shipped, argued about, and debugged while you were away.</p>
  </div>
  <div class="auth-form-side">
    <form class="form-card card" id="login-form" data-validate data-success-message="Logged in — this connects to the server in Phase 4.">
      <h1>Log in</h1>
      <p class="subtitle">Good to see you again.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <div class="field-error">Enter a valid email address.</div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <div class="field-error">Password must be at least 8 characters.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Log in</button>

      <p class="form-foot">No account yet? <a href="/register">Register</a></p>
    </form>
  </div>
</div>

<script src="/static/js/nav.js"></script>
<script src="/static/js/forms.js"></script>
</body>
</html>

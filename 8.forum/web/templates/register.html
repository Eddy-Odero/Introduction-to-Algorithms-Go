{{define "content"}}
<div class="auth-screen">
  <div class="auth-side">
    <div class="brand-mark">f</div>
    <h2>Join the community</h2>
    <p>Post what you're building, ask the questions you're stuck on, and help the next person get unstuck too.</p>
  </div>
  <div class="auth-form-side">
    <form class="form-card card" action="/register" method="POST">
      <h1>Create your account</h1>
      <p class="subtitle">Takes less than a minute.</p>

      {{if .Error}}<div class="form-error">{{.Error}}</div>{{end}}

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Create account</button>

      <p class="form-foot">Already registered? <a href="/login">Log in</a></p>
    </form>
  </div>
</div>
{{end}}

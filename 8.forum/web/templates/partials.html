{{define "postcard"}}
<article class="card post-item">
  <div class="post-item-head">
    <div class="avatar avatar-md {{.Avatar}}">{{.Initials}}</div>
    <div class="who">
      <span class="author">{{.Author}}</span>
      <span class="meta">{{.TimeAgo}}</span>
    </div>
  </div>

  {{if .LoggedIn}}
  <h2><a href="/post?id={{.ID}}">{{.Title}}</a></h2>
  {{else}}
  <h2>{{.Title}}</h2>
  {{end}}

  {{if .HasImage}}
  <div class="post-image" style="background: linear-gradient(135deg, #F77737, #833AB4);">event photo</div>
  {{end}}

  <p>{{.Excerpt}}</p>

  <div class="tag-row">
    {{range .Tags}}<span class="tag tag-{{.}}">#{{.}}</span>{{end}}
  </div>

  {{if .LoggedIn}}
  <div class="action-row">
    <form action="/reaction" method="POST">
      <input type="hidden" name="post_id" value="{{.ID}}">
      <button type="submit" name="type" value="like" class="action-btn" aria-label="Like">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v11M2 13v6a2 2 0 002 2h13.5a2 2 0 002-1.6l1.4-7A2 2 0 0018.5 10H14V5a2 2 0 00-2-2L9 10"/></svg>
        <span class="action-count">{{.Likes}}</span>
      </button>
    </form>
    <form action="/reaction" method="POST">
      <input type="hidden" name="post_id" value="{{.ID}}">
      <button type="submit" name="type" value="dislike" class="action-btn" aria-label="Dislike">
        <svg class="icon-flip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v11M2 13v6a2 2 0 002 2h13.5a2 2 0 002-1.6l1.4-7A2 2 0 0018.5 10H14V5a2 2 0 00-2-2L9 10"/></svg>
        <span class="action-count">{{.Dislikes}}</span>
      </button>
    </form>
    <a href="/post?id={{.ID}}" class="action-btn" aria-label="Comments">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-9 8.5 8.79 8.79 0 01-4-1L3 20l1-4a8.38 8.38 0 01-1-4 8.5 8.5 0 018.5-8.5h.5A8.38 8.38 0 0121 11.5z"/></svg>
      <span>{{.Comments}}</span>
    </a>
  </div>
  {{else}}
  <div class="action-row readonly">
    <span class="stat stat-like">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v11M2 13v6a2 2 0 002 2h13.5a2 2 0 002-1.6l1.4-7A2 2 0 0018.5 10H14V5a2 2 0 00-2-2L9 10"/></svg>
      {{.Likes}}
    </span>
    <span class="stat stat-dislike">
      <svg class="icon-flip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v11M2 13v6a2 2 0 002 2h13.5a2 2 0 002-1.6l1.4-7A2 2 0 0018.5 10H14V5a2 2 0 00-2-2L9 10"/></svg>
      {{.Dislikes}}
    </span>
    <span class="stat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-9 8.5 8.79 8.79 0 01-4-1L3 20l1-4a8.38 8.38 0 01-1-4 8.5 8.5 0 018.5-8.5h.5A8.38 8.38 0 0121 11.5z"/></svg>
      {{.Comments}}
    </span>
  </div>
  {{end}}
</article>
{{end}}

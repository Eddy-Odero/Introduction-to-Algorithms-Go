{{define "content"}}
<div class="auth-screen">
  <div class="auth-side">
    <div class="brand-mark">f</div>
    <h2>Welcome back</h2>
    <p>Catch up on what the community shipped, argued about, and debugged while you were away.</p>
  </div>
  <div class="auth-form-side">
    <form class="form-card card" action="/login" method="POST">
      <h1>Log in</h1>
      <p class="subtitle">Good to see you again.</p>

      {{if .Error}}<div class="form-error">{{.Error}}</div>{{end}}

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Log in</button>

      <p class="form-foot">No account yet? <a href="/register">Register</a></p>
    </form>
  </div>
</div>
{{end}}

name: Go CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: false

      - name: Test all modules
        run: |
          find . -name go.mod -execdir go test ./... \;